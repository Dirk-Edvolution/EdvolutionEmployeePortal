name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: edvolution-admon
  REGION: us-central1
  SERVICE_NAME: employee-portal
  # These ideally should be GitHub Secrets/Variables, but for the tutorial we set them here matching your .env
  WORKSPACE_DOMAIN: edvolution.io
  ADMIN_USERS: dirk@edvolution.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Log in to Google Cloud using the Service Account Key (Secret)
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Build and Deploy
      # We replicate your deploy.sh logic here
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 10 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --set-env-vars "GCP_LOCATION=${{ env.REGION }}" \
            --set-env-vars "FLASK_ENV=production" \
            --set-env-vars "WORKSPACE_DOMAIN=${{ env.WORKSPACE_DOMAIN }}" \
            --set-env-vars "ADMIN_USERS=${{ env.ADMIN_USERS }}"
