name: Deploy to Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: edvolution-admon
  REGION: us-central1
  SERVICE_NAME: employee-portal
  # These ideally should be GitHub Secrets/Variables, but for the tutorial we set them here matching your .env
  WORKSPACE_DOMAIN: edvolution.io
  ADMIN_USERS: dirk@edvolution.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Log in to Google Cloud using the Service Account Key (Secret)
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Debug Bucket Access
      - name: Debug Bucket Access
        run: gcloud storage ls gs://${{ env.PROJECT_ID }}-staging/ || echo "Bucket listing failed"

      # Build container image explicitly using Cloud Build
      - name: Build Container Image
        run: |
          IMAGE_URL="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/my-repo/${{ env.SERVICE_NAME }}"
          gcloud builds submit --region=${{ env.REGION }} --tag $IMAGE_URL \
            --gcs-source-staging-dir="gs://${{ env.PROJECT_ID }}-staging/source" \
            --gcs-log-dir="gs://${{ env.PROJECT_ID }}-staging/logs"

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE_URL="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/my-repo/${{ env.SERVICE_NAME }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_URL \
            --platform managed \
            --service-account employee-portal-runtime@edvolution-admon.iam.gserviceaccount.com \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 10 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --set-env-vars "GCP_LOCATION=${{ env.REGION }}" \
            --set-env-vars "FLASK_ENV=production" \
            --set-env-vars "WORKSPACE_DOMAIN=${{ env.WORKSPACE_DOMAIN }}" \
            --set-env-vars "ADMIN_USERS=${{ env.ADMIN_USERS }}"
